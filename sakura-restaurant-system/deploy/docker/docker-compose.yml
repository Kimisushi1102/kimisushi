version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sakura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sakura_restaurant
      POSTGRES_USER: ${DB_USER:-sakura_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sakura_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sakura-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sakura_user} -d sakura_restaurant"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sakura-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sakura_restaurant
      DB_USER: ${DB_USER:-sakura_user}
      DB_PASSWORD: ${DB_PASSWORD:-sakura_password}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-Sakura Restaurant <noreply@sakura-restaurant.de>}
      RESTAURANT_NAME: ${RESTAURANT_NAME:-Sakura Restaurant}
      RESTAURANT_ADDRESS: ${RESTAURANT_ADDRESS}
      RESTAURANT_PHONE: ${RESTAURANT_PHONE}
      RESTAURANT_EMAIL: ${RESTAURANT_EMAIL}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sakura-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Next.js)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: sakura-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://your-domain.com/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - sakura-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: sakura-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/sakura.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - sakura-network

networks:
  sakura-network:
    driver: bridge

volumes:
  postgres_data:
